name: Daily notice scan

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 0 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Keep previous data
        run: |
          mkdir -p tmp
          if [ -f data/notices.json ]; then cp data/notices.json tmp/previous-notices.json; else echo '{"notices":[]}' > tmp/previous-notices.json; fi

      - name: Collect notices
        run: python scripts/collect_notices.py

      - name: Detect new notices
        id: detect
        run: python scripts/detect_new_notices.py tmp/previous-notices.json data/notices.json tmp/new-notices.txt

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update notice scan results"
          file_pattern: "data/notices.json data/notices.js"

      - name: Create test notification
        if: github.event_name == 'push' && contains(github.event.head_commit.message, 'Test phone notification')
        run: |
          mkdir -p tmp
          {
            echo "영상공고 테스트 알림입니다."
            echo ""
            echo "GitHub Actions와 ntfy 연결이 정상인지 확인하는 알림입니다."
          } > tmp/test-notification.txt

      - name: Send test phone notification
        if: github.event_name == 'push' && contains(github.event.head_commit.message, 'Test phone notification')
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/send_notification.py tmp/test-notification.txt

      - name: Send phone notification
        if: steps.detect.outputs.has_new == 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/send_notification.py tmp/new-notices.txt
